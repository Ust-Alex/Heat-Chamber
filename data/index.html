<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heat Chamber</title>
    
    <!-- Chart.js -->
    <script src="chart.umd.min.js"></script>
    
    <!-- Hammer.js для жестов -->
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    
    <!-- Плагин зума -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Верхняя панель (режим и время) -->
    <div class="window window-header" id="windowHeader">
        <div class="mode-bar mode0" id="modeDisplay">
            MODE 1 (СТАБИЛИЗАЦИЯ) 00:00
        </div>
    </div>

    <!-- Левая панель управления -->
    <div class="window window-left" id="windowLeft">
        <div class="left-panel">
            <!-- Карточки температур -->
            <div class="temp-card" id="card3" style="color: #FFA500;">--.--</div>  <!-- 100см -->
            <div class="temp-card" id="card2" style="color: #00FFFF;">--.--</div>  <!-- 75см -->
            <div class="temp-card" id="card1" style="color: #FFFF00;">--.--</div>  <!-- 50см -->
            <div class="temp-card" id="card0" style="color: #00FF00;">--.--</div>  <!-- Гильза -->
            
            <!-- Кнопки масштаба графика -->
            <button class="scale-btn" id="btn30m" data-range="30м">30м</button>
            <button class="scale-btn active" id="btn15m" data-range="15м">15м</button>
            <button class="scale-btn" id="btn5m" data-range="5м">5м</button>
            <button class="scale-btn" id="btn1m" data-range="1м">1м</button>
            
            <!-- Дополнительные кнопки управления (НОВЫЕ) -->
            <button class="action-btn" id="btnPower" style="background: #4CAF50;">ВКЛ</button>
            <button class="action-btn" id="btnSetTarget">Уставка</button>
            
            <!-- Нижний блок -->
            <div class="panel-bottom">
                <div class="panel-range-item">
                    <label>до</label>
                    <input type="number" id="maxTemp" value="70.0" step="0.1" min="0.0" max="100.0">
                </div>
                <div class="panel-range-item">
                    <label>от</label>
                    <input type="number" id="minTemp" value="20.0" step="0.1" min="0.0" max="100.0">
                </div>
                <div class="panel-target" id="panelTarget">
                    <span class="target-label">Уставка</span>
                    <span class="target-value" id="targetValue">30.0</span>
                </div>
                <div class="panel-status" id="panelStatus">
                    <span class="panel-status-dot offline" id="panelStatusDot"></span>
                    <span class="panel-status-text offline" id="panelStatusText">OFF</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Окно графика -->
    <div class="window window-graph" id="windowGraph">
        <canvas id="tempChart"></canvas>
    </div>

    <!-- Нижняя панель (отладка) -->
    <div class="window window-debug" id="windowDebug">
        <div class="debug-bar" id="debugBar">
            <span>Буфер: <span class="debug-value" id="debugBuffer">0/7200</span></span>
            <span>Диапазон: <span class="debug-value" id="debugRange">120</span></span>
            <span>Активна: <span class="debug-value" id="debugActive">15м</span></span>
            <span>IP: <span class="debug-value" id="debugIP">--.---.--.--</span></span>
        </div>
    </div>

    <!-- Модальное окно для ввода уставки -->
    <div id="targetModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Установка температуры</h3>
            <input type="number" id="modalTarget" step="0.5" min="0" max="70" value="30.0">
            <button id="modalSubmit">Применить</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
