<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Термический реформинг</title>
    
    <!-- СТИЛИ В HEAD -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
    <div class="window window-header" id="windowHeader">
        <div class="top-bar">
            <div class="top-left">
                Термический реформинг
                <span class="live-time" id="ntpTime" style="margin-left: 10px; color: #ffaa00;">00:00:00</span>
            </div>
            <div class="top-center" id="topSetpoint">30.0°C</div>
            <div class="top-right">
                <span class="top-time" id="topTime">00:00</span>
                <span class="wifi-dot" id="wifiDot"></span>
            </div>
        </div>
    </div>

    <!-- ЛЕВАЯ ПАНЕЛЬ -->
    <div class="window window-left" id="windowLeft">
        <div class="left-panel">
            <div class="sensor-temp" id="sensor1" style="color: #00FF00;">--.-</div>
            <div class="sensor-temp" id="sensor2" style="color: #FFFF00;">--.-</div>
            <div class="sensor-temp" id="sensor3" style="color: #FFA500;">--.-</div>
            
            <button class="power-btn" id="btnPower">ВКЛ</button>
            
            <div class="setpoint-block">
                <div class="setpoint-label">T°C</div>
                <input type="text" id="setpointInput" value="30" inputmode="numeric" pattern="[0-9]*">
            </div>
            
            <div class="power-block">
                <div class="power-label">Мощность</div>
                <div class="power-value" id="powerValue">0.0% (0)</div>
            </div>
            
            <div class="timer-block">
                <div class="timer-label">Время</div>
                <div class="timer-value" id="timerValue">00:00</div>
            </div>
            
            <div class="wifi-block">
                <span class="wifi-dot" id="wifiDotLeft"></span>
                <span class="wifi-text" id="wifiText">WiFi</span>
            </div>
        </div>
    </div>

    <!-- ГРАФИК С НОВЫМИ КНОПКАМИ -->
    <div class="window window-graph" id="windowGraph">
        <div class="graph-toolbar">
            <button class="scale-btn" data-range="10">10м</button>
            <button class="scale-btn active" data-range="30">30м</button>
            <button class="scale-btn" data-range="45">45м</button>
            <button class="scale-btn" data-range="half">1/2</button>
            <button class="scale-btn" data-range="quarter">1/4</button>
        </div>
        <canvas id="tempChart"></canvas>
    </div>

    <!-- НИЖНЯЯ ПАНЕЛЬ -->
    <div class="window window-debug" id="windowDebug">
        <div class="debug-bar">
            <span>Буфер: <span class="debug-value" id="debugBuffer">0/2700</span></span>
            <span>Датчики: <span class="debug-value" id="debugSensors">3</span></span>
            <span>Режим: <span class="debug-value" id="debugMode">Работа</span></span>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="targetModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Установка температуры</h3>
            <input type="number" id="modalTarget" step="1.0" min="30" max="70" value="30.0">
            <button id="modalSubmit">Применить</button>
        </div>
    </div>

    <!-- СКРИПТЫ В КОНЦЕ -->
    <script src="chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/chart.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/websocket.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
